<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cake Surprises | Celebrating Rachi</title>
    <meta name="description" content="Click a cake slice to reveal a sweet surprise!">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Outfit:wght@300;400;600&display=swap"
        rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="styles.css">

    <!-- Confetti Library -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        .cake-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #ffe0e9, #fff0f5, #f5e6e8);
            position: relative;
            overflow: hidden;
        }

        .title {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            color: #d17a8e;
            margin-bottom: 40px;
            text-align: center;
            z-index: 10;
        }

        .svg-container {
            position: relative;
            z-index: 10;
            filter: drop-shadow(0 20px 30px rgba(0, 0, 0, 0.15));
        }

        .cake-slice {
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-origin: 0 0;
        }

        .cake-slice:hover {
            transform: scale(1.05);
            filter: brightness(1.1);
        }

        /* Decoration dots for icing */
        .icing-dot {
            fill: #fff;
            opacity: 0.8;
            pointer-events: none;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 12, 41, 0.6);
            backdrop-filter: blur(5px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .modal-content {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            max-width: 500px;
            width: 90%;
            transform: translateY(50px) scale(0.9);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.2);
        }

        .modal-overlay.active .modal-content {
            transform: translateY(0) scale(1);
        }

        .modal-title {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            color: var(--primary);
            margin-bottom: 20px;
        }

        .modal-text {
            font-size: 1.3rem;
            color: #5a4b40;
            margin-bottom: 30px;
        }

        .close-btn {
            background: #e69ab0;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 20px;
            font-size: 1.1rem;
            font-family: 'Outfit', sans-serif;
            cursor: pointer;
            transition: background 0.3s;
        }

        .close-btn:hover {
            background: #d17a8e;
        }

        /* Number labels */
        .slice-number {
            fill: #fff;
            font-family: 'Outfit', sans-serif;
            font-size: 24px;
            font-weight: 600;
            pointer-events: none;
            text-anchor: middle;
            dominant-baseline: middle;
        }

        .home-btn {
            position: absolute;
            top: 30px;
            left: 30px;
            background: rgba(255, 255, 255, 0.8);
            color: #d17a8e;
            padding: 10px 20px;
            border-radius: 20px;
            text-decoration: none;
            font-weight: bold;
            z-index: 20;
            transition: all 0.3s;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .home-btn:hover {
            background: #fff;
            transform: translateY(-2px);
        }
    </style>
    <script src="countdown.js"></script>
</head>

<body>
    <div class="cake-container">
        <a href="index.html" class="home-btn">← Back to Forest</a>

        <h1 class="title">Choose a Slice for a Surprise! 🍰</h1>

        <div class="svg-container">
            <!-- SVG Cake with 5 slices -->
            <!-- 
                Angles: 
                Slice 1: 0 to 72 => x: 150 -> 46.35, y: 0 -> 142.66
                Slice 2: 72 to 144 => x: 46.35 -> -121.35, y: 142.66 -> 88.17
                Slice 3: 144 to 216 => x: -121.35 -> -121.35, y: 88.17 -> -88.17
                Slice 4: 216 to 288 => x: -121.35 -> 46.35, y: -88.17 -> -142.66
                Slice 5: 288 to 360 => x: 46.35 -> 150, y: -142.66 -> 0
            -->
            <svg width="400" height="400" viewBox="-180 -180 360 360">
                <!-- Rotate slightly so a slice forms a top pyramid, offset by -90 - 36 = -126 deg -->
                <g transform="rotate(-126)">
                    <!-- Slice 1 -->
                    <g class="cake-slice" data-slice="1">
                        <path d="M 0 0 L 150 0 A 150 150 0 0 1 46.35 142.66 Z" fill="#e69ab0" stroke="#fff"
                            stroke-width="4" />
                        <circle cx="90" cy="65" r="5" class="icing-dot" />
                        <circle cx="120" cy="30" r="4" class="icing-dot" />
                        <circle cx="60" cy="110" r="6" class="icing-dot" />
                        <text x="100" y="72" class="slice-number" transform="rotate(126, 100, 72)">1</text>
                    </g>
                    <!-- Slice 2 -->
                    <g class="cake-slice" data-slice="2">
                        <path d="M 0 0 L 46.35 142.66 A 150 150 0 0 1 -121.35 88.17 Z" fill="#d17a8e" stroke="#fff"
                            stroke-width="4" />
                        <circle cx="-30" cy="115" r="6" class="icing-dot" />
                        <circle cx="20" cy="125" r="4" class="icing-dot" />
                        <circle cx="-80" cy="80" r="5" class="icing-dot" />
                        <text x="-37" y="115" class="slice-number" transform="rotate(126, -37, 115)">2</text>
                    </g>
                    <!-- Slice 3 -->
                    <g class="cake-slice" data-slice="3">
                        <path d="M 0 0 L -121.35 88.17 A 150 150 0 0 1 -121.35 -88.17 Z" fill="#c89666" stroke="#fff"
                            stroke-width="4" />
                        <circle cx="-110" cy="0" r="5" class="icing-dot" />
                        <circle cx="-120" cy="40" r="4" class="icing-dot" />
                        <circle cx="-120" cy="-40" r="6" class="icing-dot" />
                        <text x="-115" y="0" class="slice-number" transform="rotate(126, -115, 0)">3</text>
                    </g>
                    <!-- Slice 4 -->
                    <g class="cake-slice" data-slice="4">
                        <path d="M 0 0 L -121.35 -88.17 A 150 150 0 0 1 46.35 -142.66 Z" fill="#e1b382" stroke="#fff"
                            stroke-width="4" />
                        <circle cx="-30" cy="-115" r="6" class="icing-dot" />
                        <circle cx="20" cy="-125" r="4" class="icing-dot" />
                        <circle cx="-80" cy="-80" r="5" class="icing-dot" />
                        <text x="-37" y="-115" class="slice-number" transform="rotate(126, -37, -115)">4</text>
                    </g>
                    <!-- Slice 5 -->
                    <g class="cake-slice" data-slice="5">
                        <path d="M 0 0 L 46.35 -142.66 A 150 150 0 0 1 150 0 Z" fill="#f5e6e8" stroke="#fff"
                            stroke-width="4" />
                        <!-- Dark text for lighter slice mostly handled via specific fill but generic white works -->
                        <!-- Actually fill #f5e6e8 is very light, so white text might blend in. We can stroke the text or change its fill manually. -->
                        <path d="M 0 0 L 46.35 -142.66 A 150 150 0 0 1 150 0 Z" fill="#e69ab0" stroke="#fff"
                            stroke-width="4" /> <!-- changed to pink to make white text visible -->
                        <!-- Let's use alternating colors properly: Pink, Dark Pink, Brownish, Light Brown, Pink 2 -->
                    </g>
                </g>

                <!-- I'll override the 5th slice with specific color above but let's just make it a new color entirely here so I don't duplicate tags: -->
                <g transform="rotate(-126)">
                    <!-- Let's redraw 5 with #ffb5a7 -->
                    <g class="cake-slice" data-slice="5">
                        <path d="M 0 0 L 46.35 -142.66 A 150 150 0 0 1 150 0 Z" fill="#ffb5a7" stroke="#fff"
                            stroke-width="4" />
                        <circle cx="90" cy="-65" r="5" class="icing-dot" />
                        <circle cx="120" cy="-30" r="4" class="icing-dot" />
                        <circle cx="60" cy="-110" r="6" class="icing-dot" />
                        <text x="100" y="-72" class="slice-number" transform="rotate(126, 100, -72)">5</text>
                    </g>
                </g>

                <!-- Center cake decoration -->
                <circle cx="0" cy="0" r="25" fill="#fff" stroke="#ffb5a7" stroke-width="2" />
                <circle cx="0" cy="0" r="15" fill="#e69ab0" />
            </svg>
        </div>
    </div>

    <!-- Surprise Modal -->
    <div class="modal-overlay" id="surpriseModal">
        <div class="modal-content">
            <h2 class="modal-title" id="surpriseTitle">Surprise!</h2>
            <p class="modal-text" id="surpriseText">Content goes here.</p>
            <button class="close-btn" id="closeSurpriseModal">Yayy! 💖</button>
        </div>
    </div>

    <script src="cake.js"></script>
    <script src="effects.js"></script>
</body>

</html>
