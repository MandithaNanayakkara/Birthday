<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cake Surprises | Celebrating Rachi</title>
    <meta name="description" content="Click a cake slice to reveal a sweet surprise!">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Outfit:wght@300;400;600&display=swap"
        rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="styles.css">

    <!-- Confetti Library -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        .builder-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            background: linear-gradient(135deg, #ffe0e9, #fff0f5, #f5e6e8);
            position: relative;
            padding-top: 50px;
            overflow-x: hidden;
            padding-bottom: 50px;
        }

        .title {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            color: #d17a8e;
            text-align: center;
            margin-bottom: 15px;
            padding: 0 20px;
        }

        .bear-message-box {
            background: #fff;
            padding: 15px 25px;
            border-radius: 20px;
            font-size: 1.2rem;
            color: #5a4b40;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
            max-width: 80%;
            text-align: center;
            font-weight: 600;
            position: relative;
            transition: all 0.3s ease;
            z-index: 10;
        }

        .bear-message-box::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 10px 10px 0;
            border-style: solid;
            border-color: #fff transparent transparent transparent;
        }

        .cake-display {
            width: 250px;
            height: 250px;
            position: relative;
            margin-bottom: 30px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        /* Cake Elements */
        .cake-layer {
            position: absolute;
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform: scale(0);
        }

        .cake-layer.active {
            opacity: 1;
            transform: scale(1);
        }

        .cake-base {
            bottom: 40px;
            width: 180px;
            height: 90px;
            border-radius: 10px;
            box-shadow: inset 0 -10px 0 rgba(0, 0, 0, 0.1), 0 10px 15px rgba(0, 0, 0, 0.2);
        }

        .cake-frosting {
            bottom: 120px;
            width: 190px;
            height: 40px;
            border-radius: 20px;
            box-shadow: inset 0 -5px 0 rgba(0, 0, 0, 0.1);
            z-index: 2;
        }

        .cake-decor {
            bottom: 150px;
            font-size: 60px;
            line-height: 1;
            z-index: 3;
            text-shadow: 0 5px 10px rgba(0, 0, 0, 0.2);
        }

        /* Adjustments for cupcake specifically */
        .is-cupcake .cake-base {
            width: 100px;
            height: 80px;
            border-radius: 10px 10px 50px 50px;
            bottom: 40px;
        }

        .is-cupcake .cake-frosting {
            width: 120px;
            height: 60px;
            border-radius: 50px 50px 10px 10px;
            bottom: 110px;
        }

        .is-cupcake .cake-decor {
            bottom: 155px;
        }

        /* Cake Colors */
        .base-vanilla {
            background: #fdf5e6;
            border: 2px solid #f5deb3;
        }

        .base-chocolate {
            background: #4b2c20;
            border: 2px solid #3e2723;
        }

        .base-cupcake {
            background: #ffefd5;
            border: 2px solid #deb887;
        }

        .frosting-strawberry {
            background: #ffb6c1;
            border: 2px solid #ff69b4;
        }

        .frosting-chocolate {
            background: #3e2723;
            border: 2px solid #2b1d16;
        }

        .frosting-cream {
            background: #fffaf0;
            border: 2px solid #f5f5dc;
        }

        /* Options Panel */
        .step-title {
            font-size: 1.2rem;
            color: #d17a8e;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .options-panel {
            background: rgba(255, 255, 255, 0.8);
            padding: 20px;
            border-radius: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 600px;
            width: 90%;
            margin-bottom: 20px;
        }

        .option-btn {
            background: #fff;
            color: #5a4b40;
            border: 2px solid #e69ab0;
            padding: 10px 15px;
            border-radius: 15px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 10px rgba(0, 0, 0, 0.05);
            font-weight: 600;
        }

        .option-btn:hover,
        .option-btn.selected {
            background: #e69ab0;
            color: white;
            transform: translateY(-3px);
        }

        .action-btn {
            background: #c89666;
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 1.3rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(200, 150, 102, 0.4);
            transition: all 0.3s;
            display: none;
            margin-top: 10px;
            font-family: inherit;
        }

        .action-btn.visible {
            display: block;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .action-btn:hover {
            transform: translateY(-5px) scale(1.05);
            background: #e1b382;
        }

        .cut-cake-btn {
            background: #ff4b4b;
            box-shadow: 0 10px 20px rgba(255, 75, 75, 0.4);
        }

        .cut-cake-btn:hover {
            background: #ff7676;
        }

        @keyframes popIn {
            0% {
                transform: scale(0);
            }

            100% {
                transform: scale(1);
            }
        }

        /* Modal specific to this page */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 12, 41, 0.6);
            backdrop-filter: blur(5px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .modal-content {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            max-width: 500px;
            width: 90%;
            transform: translateY(50px) scale(0.9);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.2);
            border: 4px solid #ffb6c1;
        }

        .modal-overlay.active .modal-content {
            transform: translateY(0) scale(1);
        }

        .modal-title {
            font-size: 2rem;
            color: #d17a8e;
            margin-bottom: 15px;
            font-family: 'Playfair Display', serif;
        }

        .modal-text {
            font-size: 1.2rem;
            color: #5a4b40;
            margin-bottom: 25px;
            line-height: 1.6;
        }

        .home-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.8);
            color: #d17a8e;
            padding: 10px 20px;
            border-radius: 20px;
            text-decoration: none;
            font-weight: bold;
            z-index: 20;
            transition: all 0.3s;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .home-btn:hover {
            background: #fff;
            transform: translateY(-2px);
        }

        .cut-slice {
            clip-path: polygon(0 0, 70% 0, 50% 100%, 0 100%);
            transform: translateX(-20px);
        }
    </style>
    <script src="countdown.js"></script>
</head>

<body>
    <div class="builder-container">
        <a href="index.html#forest" class="home-btn">← Back to Forest</a>

        <h1 class="title">Rachi's Bakery 🎂</h1>

        <div class="bear-message-box" id="bearMessageBox">
            Rachi, let’s build the perfect birthday cake! 🧸🎂
        </div>

        <div class="cake-display" id="cakeDisplay">
            <div class="cake-layer cake-base" id="cakeBase"></div>
            <div class="cake-layer cake-frosting" id="cakeFrosting"></div>
            <div class="cake-layer cake-decor" id="cakeDecor"></div>
        </div>

        <div class="step-title" id="stepTitle">Step 1: Choose Base</div>
        <div class="options-panel" id="optionsPanel">
            <!-- Populated by JS -->
        </div>

        <button class="action-btn finish-btn" id="finishCakeBtn">Finish Cake ✨</button>
        <button class="action-btn cut-cake-btn" id="cutCakeBtn">Cut the Cake! 🔪</button>
    </div>

    <!-- Surprise Modal -->
    <div class="modal-overlay" id="surpriseModal">
        <div class="modal-content">
            <h2 class="modal-title" id="surpriseTitle">Surprise!</h2>
            <p class="modal-text" id="surpriseText">Content goes here.</p>
            <button class="action-btn" style="display:inline-block;" id="closeSurpriseModal">Yayy! 💖</button>
        </div>
    </div>

    <script src="cake.js"></script>
    <script src="effects.js"></script>
</body>

</html>
