<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catch the Bears | Celebrating Rachi</title>
    <meta name="description" content="A fun bear catching mini-game for Rachi.">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Outfit:wght@300;400;600&display=swap"
        rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="styles.css">

    <!-- Confetti Library -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        body {
            overflow: hidden;
            /* Prevent scrolling in this game */
        }

        .game-container {
            width: 100vw;
            height: 100vh;
            background: linear-gradient(135deg, #e0f2fe, #f0fdf4, #fdf4ff);
            background-image: url('assets/bear_forest_bg.png');
            background-size: cover;
            background-position: center;
            position: relative;
        }

        .game-ui {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.9);
            padding: 15px 40px;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            z-index: 100;
            min-width: 300px;
            border: 2px solid var(--primary-light);
        }

        .score {
            font-size: 2.5rem;
            font-family: 'Playfair Display', serif;
            color: var(--primary);
            font-weight: bold;
        }

        .title-display {
            font-size: 1.2rem;
            color: #d17a8e;
            font-weight: 600;
            margin-top: 5px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .falling-bear {
            position: absolute;
            width: 80px;
            cursor: pointer;
            user-select: none;
            transition: transform 0.1s;
            filter: drop-shadow(0 10px 10px rgba(0, 0, 0, 0.3));
        }

        .falling-bear:hover {
            transform: scale(1.1);
        }

        .floating-text {
            position: absolute;
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            color: #d17a8e;
            font-weight: bold;
            pointer-events: none;
            animation: floatUp 1s ease-out forwards;
            text-shadow: 2px 2px 0 #fff, -2px -2px 0 #fff, 2px -2px 0 #fff, -2px 2px 0 #fff;
            z-index: 101;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) scale(1);
                opacity: 1;
            }

            100% {
                transform: translateY(-50px) scale(1.2);
                opacity: 0;
            }
        }

        .home-btn {
            position: absolute;
            top: 30px;
            left: 30px;
            background: rgba(255, 255, 255, 0.8);
            color: #d17a8e;
            padding: 10px 20px;
            border-radius: 20px;
            text-decoration: none;
            font-weight: bold;
            z-index: 100;
            transition: all 0.3s;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .home-btn:hover {
            background: #fff;
            transform: translateY(-2px);
        }

        /* Master Modal overlay */
        .master-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 12, 41, 0.7);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        .master-modal.active {
            opacity: 1;
            pointer-events: all;
        }

        .master-content {
            background: rgba(255, 255, 255, 0.95);
            padding: 50px;
            border-radius: 40px;
            text-align: center;
            max-width: 600px;
            width: 90%;
            transform: translateY(50px) scale(0.9);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3);
            border: 4px solid #d17a8e;
        }

        .master-modal.active .master-content {
            transform: translateY(0) scale(1);
        }

        .master-hero-bear {
            width: 150px;
            margin-bottom: 20px;
            animation: bounce 2s infinite ease-in-out;
            filter: drop-shadow(0 10px 15px rgba(0, 0, 0, 0.2));
        }

        @keyframes bounce {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-20px);
            }
        }

        .master-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            color: #d17a8e;
            margin-bottom: 20px;
            line-height: 1.2;
        }

        .master-subtitle {
            font-size: 1.2rem;
            color: #5a4b40;
            margin-bottom: 30px;
        }

        .keep-playing-btn {
            background: #c89666;
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 1.2rem;
            font-weight: 600;
            font-family: 'Outfit', sans-serif;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 20px rgba(200, 150, 102, 0.4);
        }

        .keep-playing-btn:hover {
            background: #e1b382;
            transform: translateY(-3px);
            box-shadow: 0 15px 25px rgba(225, 179, 130, 0.5);
        }
    </style>
    <script src="countdown.js"></script>
</head>

<body>
    <div class="game-container" id="gameContainer">
        <a href="index.html" class="home-btn">← Back to Forest</a>

        <div class="game-ui">
            <div class="score">Score: <span id="scoreValue">0</span></div>
            <div class="title-display" id="titleDisplay">Bear Beginner</div>
        </div>
    </div>

    <!-- Master Modal -->
    <div class="master-modal" id="masterModal">
        <div class="master-content">
            <img src="assets/waving_bear.png" alt="Bear Master" class="master-hero-bear">
            <h2 class="master-title">Rachi you are now a Bear Master! 🧸👑</h2>
            <p class="master-subtitle">You caught so many bears! The forest loves you!</p>
            <button class="keep-playing-btn" id="keepPlayingBtn">Keep Catching 💕</button>
        </div>
    </div>

    <script src="catch_bears.js"></script>
    <script src="effects.js"></script>
</body>

</html>
